<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="I Fix Team">
<meta name="theme-color" content="#F2F2F1">
<link rel="manifest" href="manifest.json">
<title>متابعة جهازك — I Fix Team</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --red:#E8321E; --red-dark:#C22513; --blue:#2B1DE8; --gold:#BE8A1C;
    --green:#16A34A; --ink:#101014; --paper:#F2F2F1;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; color:var(--ink);
    font-family:'Tajawal','Segoe UI',sans-serif;
    background:
      radial-gradient(circle at 1.5px 1.5px, rgba(16,16,20,.055) 1.5px, transparent 1.6px) 0 0/18px 18px,
      var(--paper);
    display:flex; align-items:flex-start; justify-content:center; padding:28px 16px 48px;
  }
  .wrap{width:100%; max-width:480px;}
  .logo{width:150px; display:block; margin:0 auto 6px; filter:drop-shadow(0 6px 16px rgba(16,16,20,.10));}
  .card{
    background:rgba(255,255,255,.8); backdrop-filter:blur(9px); -webkit-backdrop-filter:blur(9px);
    border:1px solid rgba(255,255,255,.9); border-radius:18px; padding:22px;
    box-shadow:0 18px 50px rgba(16,16,20,.13); position:relative; overflow:hidden;
  }
  .card::before{
    content:""; position:absolute; top:0; right:0; left:0; height:5px;
    background:linear-gradient(to left, var(--blue) 0 34%, var(--red) 34% 67%, var(--gold) 67% 100%);
  }
  h1{font-family:'Cairo',sans-serif; font-size:19px; margin:6px 0 2px; text-align:center;}
  .ref{text-align:center; font-family:monospace; font-size:14px; color:#6B7280; margin-bottom:4px;}
  .hello{text-align:center; font-size:14px; color:#4B5563; margin-bottom:18px;}

  /* شريط التقدم زي شريط التحميل */
  .bar-wrap{background:#E7E8EC; border-radius:20px; height:22px; overflow:hidden; position:relative;}
  .bar{
    height:100%; border-radius:20px; width:0%;
    background:linear-gradient(90deg, var(--red), var(--gold));
    transition:width 1.1s cubic-bezier(.4,0,.2,1);
    position:relative;
  }
  .bar::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(110deg, transparent 30%, rgba(255,255,255,.45) 50%, transparent 70%);
    animation:shimmer 1.6s infinite;
  }
  .bar.full{background:linear-gradient(90deg, var(--green), #22C55E);}
  @keyframes shimmer{ from{transform:translateX(100%);} to{transform:translateX(-100%);} }
  .bar-pct{
    text-align:center; font-family:'Cairo',sans-serif; font-weight:900; font-size:26px; margin:10px 0 2px;
  }
  .bar-status{text-align:center; font-size:15px; font-weight:700; margin-bottom:20px;}

  /* المراحل */
  .steps{display:flex; flex-direction:column; gap:0; margin-top:6px;}
  .step{display:flex; gap:14px; align-items:flex-start; position:relative; padding-bottom:22px;}
  .step:last-child{padding-bottom:0;}
  .step::before{
    content:""; position:absolute; top:30px; bottom:0; inset-inline-start:14px; width:3px;
    background:#E7E8EC; border-radius:2px;
  }
  .step:last-child::before{display:none;}
  .step.done::before{background:var(--green);}
  .dot{
    width:31px; height:31px; border-radius:50%; flex-shrink:0; z-index:1;
    display:flex; align-items:center; justify-content:center; font-size:14px;
    background:#fff; border:2.5px solid #D6D8DE; color:#9CA3AF;
  }
  .step.done .dot{background:var(--green); border-color:var(--green); color:#fff;}
  .step.current .dot{
    background:#fff; border-color:var(--red); color:var(--red);
    animation:pulse 1.4s infinite;
  }
  @keyframes pulse{ 0%,100%{box-shadow:0 0 0 0 rgba(232,50,30,.35);} 50%{box-shadow:0 0 0 9px rgba(232,50,30,0);} }
  .step-title{font-weight:800; font-size:15px;}
  .step.current .step-title{color:var(--red);}
  .step.done .step-title{color:var(--green);}
  .step-sub{font-size:12.5px; color:#8A8F98; margin-top:2px;}

  /* العطل */
  .issue-card{
    display:none; margin-top:16px; background:#EEF2FF;
    border:1.5px solid #C7D2FE; border-radius:14px; padding:13px 16px;
  }
  .issue-card .lbl{font-size:12.5px; color:#4338CA; font-weight:800; margin-bottom:4px;}
  .issue-card .txt{font-size:14.5px; font-weight:600; line-height:1.7;}

  /* رسالة الاستلام */
  .pickup{
    display:none; margin-top:16px; background:linear-gradient(135deg,#F0FDF4,#DCFCE7);
    border:1.5px solid #86EFAC; border-radius:14px; padding:16px; text-align:center;
    font-weight:800; font-size:15.5px; color:#166534;
  }

  /* السعر */
  .price-card{
    display:none; margin-top:18px; background:linear-gradient(135deg, #FFF8EC, #FFF3D9);
    border:1.5px solid #EACB84; border-radius:14px; padding:14px 18px;
    text-align:center;
  }
  .price-card .lbl{font-size:13px; color:#9A6A0C; font-weight:700;}
  .price-card .num{font-family:'Cairo',sans-serif; font-size:30px; font-weight:900; color:#B45309;}

  .special{
    display:none; margin-top:16px; border-radius:14px; padding:16px; text-align:center;
    font-weight:800; font-size:15px;
  }

  .meta{margin-top:18px; text-align:center; font-size:12px; color:#9CA3AF;}
  .state-msg{text-align:center; padding:34px 10px; font-size:15px; color:#6B7280;}
  .foot{text-align:center; margin-top:16px; font-size:12px; color:#9CA3AF;}
  .foot b{font-family:'Cairo',sans-serif; color:var(--red);}
</style>
</head>
<body>
<div class="wrap">
  <img class="logo" src="logo.jpg" alt="I Fix Team">
  <div class="card">
    <div id="loading" class="state-msg">جارٍ تحميل بيانات جهازك<br>⏳</div>
    <div id="notfound" class="state-msg" style="display:none;">
      اللينك ده مش صحيح أو الجهاز اتشال من النظام.<br>لو محتاج مساعدة كلم المحل مباشرة 🙏
    </div>

    <div id="content" style="display:none;">
      <h1 id="devName"></h1>
      <div class="ref" id="devRef"></div>
      <div class="hello" id="hello"></div>

      <div class="bar-wrap"><div class="bar" id="bar"></div></div>
      <div class="bar-pct" id="pct">0%</div>
      <div class="bar-status" id="statusLine"></div>

      <div class="steps" id="steps"></div>

      <div class="issue-card" id="issueCard">
        <div class="lbl" id="issueLbl"></div>
        <div class="txt" id="issueTxt"></div>
      </div>

      <div class="pickup" id="pickupBox">✅ جهازك جاهز — برجاء الاستلام من الفرع 🙏</div>

      <div class="price-card" id="priceCard">
        <div class="lbl">تكلفة الصيانة</div>
        <div class="num" id="priceNum"></div>
      </div>

      <div class="special" id="specialBox"></div>

      <div class="meta" id="meta"></div>
    </div>
  </div>
  <div class="foot">خدمة متابعة الصيانة من <b>I FIX TEAM</b> — الصفحة بتتحدث تلقائياً</div>
</div>

<script>
const sb = supabase.createClient(
  "https://ujpnewqqdkmiedtwvdsy.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqcG5ld3FxZGttaWVkdHd2ZHN5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0MzI0ODEsImV4cCI6MjEwMDAwODQ4MX0.PVreBU_ONzAsHO58AJgXVUhuZjvz0quJU8OTxEVcjDc"
);

const $ = id => document.getElementById(id);
const token = new URLSearchParams(location.search).get('t');

// المراحل اللي العميل بيشوفها (لحد تم الصيانة، والتسليم بيظهر كمكافأة نهائية)
const STEPS = [
  { key:'waiting',    icon:'📥', title:'تم استلام الجهاز',  sub:'جهازك اتسجل عندنا وداخل على الفحص', pct:15 },
  { key:'diagnosing', icon:'🔍', title:'جاري الكشف',        sub:'بنفحص الجهاز لتحديد العطل بدقة', pct:45 },
  { key:'repairing',  icon:'🔧', title:'جاري الصيانة',      sub:'العطل اتحدد والصيانة شغالة فعلياً', pct:75 },
  { key:'done',       icon:'🎉', title:'تمت الصيانة',       sub:'جهازك جاهز للاستلام من المحل', pct:100 },
];
const ORDER = ['waiting','diagnosing','repairing','done'];

function renderTrack(data){
  $('loading').style.display = 'none';
  $('notfound').style.display = 'none';
  $('content').style.display = 'block';

  $('devName').textContent = `${data.deviceType} ${data.model}`.trim();
  $('devRef').textContent = 'رقم المتابعة: ' + (data.ref || '');
  $('hello').textContent = data.customerName ? `أهلاً ${data.customerName} 👋 دي حالة جهازك لحظة بلحظة` : 'دي حالة جهازك لحظة بلحظة';

  const st = data.status;
  const special = $('specialBox');
  special.style.display = 'none';

  let idx = ORDER.indexOf(st);
  let pct, statusText, full = false;

  if(st === 'delivered'){
    idx = ORDER.length - 1; pct = 100; full = true;
    statusText = '✅ تم تسليم الجهاز — شكراً لثقتك في I Fix Team';
  } else if(st === 'rejected'){
    idx = -1; pct = 100; full = false;
    statusText = 'تم الاعتذار عن الصيانة';
    special.style.display = 'block';
    special.style.background = '#FEF2F2'; special.style.border = '1.5px solid #FECACA'; special.style.color = '#B91C1C';
    special.textContent = 'للأسف تعذّرت صيانة الجهاز — تقدر تستلمه من المحل، وكلمنا لأي استفسار 🙏';
  } else if(st === 'returned'){
    idx = -1; pct = 100; full = false;
    statusText = 'الجهاز في المرتجعات';
    special.style.display = 'block';
    special.style.background = '#FFF7ED'; special.style.border = '1.5px solid #FED7AA'; special.style.color = '#C2410C';
    special.textContent = 'الجهاز رجع للمراجعة عندنا — هنتواصل معاك بالتفاصيل في أقرب وقت';
  } else {
    if(idx < 0) idx = 0;
    pct = STEPS[idx].pct;
    full = (st === 'done');
    statusText = STEPS[idx].icon + ' ' + STEPS[idx].title;
  }

  const bar = $('bar');
  bar.classList.toggle('full', full);
  requestAnimationFrame(() => { bar.style.width = pct + '%'; });
  $('pct').textContent = pct + '%';
  $('statusLine').textContent = statusText;

  $('steps').innerHTML = STEPS.map((s, i) => {
    const cls = (st === 'delivered' || i < idx) ? 'done' : (i === idx && st !== 'delivered' ? (st === 'done' ? 'done' : 'current') : '');
    const dot = (cls === 'done') ? '✓' : s.icon;
    return `<div class="step ${cls}">
      <div class="dot">${dot}</div>
      <div><div class="step-title">${s.title}</div><div class="step-sub">${s.sub}</div></div>
    </div>`;
  }).join('');

  // العطل: قبل الصيانة = المُبلّغ عنه، من الصيانة وبعدها = المكتشف
  if(data.issue && data.issue.trim()){
    $('issueCard').style.display = 'block';
    const discovered = ['repairing','done','delivered'].includes(st);
    $('issueLbl').textContent = discovered ? '🔎 تم اكتشاف العطل' : '📝 العطل المُبلّغ عنه';
    $('issueTxt').textContent = data.issue;
  } else {
    $('issueCard').style.display = 'none';
  }

  // رسالة الاستلام من الفرع
  $('pickupBox').style.display = (st === 'done') ? 'block' : 'none';

  if(data.price > 0){
    $('priceCard').style.display = 'block';
    $('priceNum').textContent = data.price.toLocaleString('en-EG') + ' ج.م';
  } else {
    $('priceCard').style.display = 'none';
  }

  $('meta').textContent = 'آخر تحديث: ' + new Date(data.updatedAt || Date.now()).toLocaleString('ar-EG');
}

async function load(){
  if(!token){ $('loading').style.display='none'; $('notfound').style.display='block'; return; }
  try{
    const { data, error } = await sb.from('public_track').select('payload').eq('token', token).maybeSingle();
    if(error || !data){ $('loading').style.display='none'; $('notfound').style.display='block'; return; }
    renderTrack(JSON.parse(data.payload));
  }catch(e){
    $('loading').style.display='none'; $('notfound').style.display='block';
  }
}

load();
setInterval(load, 10000); // تحديث تلقائي كل ١٠ ثواني
// ولو العميل رجع للصفحة بعد ما سابها، تتحدث فوراً
document.addEventListener('visibilitychange', () => { if(!document.hidden) load(); });
</script>
</body>
</html>
